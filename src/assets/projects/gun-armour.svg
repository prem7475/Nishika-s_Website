<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9D8A6" />
      <stop offset="0.45" stop-color="#C8A85A" />
      <stop offset="1" stop-color="#9A7A36" />
    </linearGradient>
    <radialGradient id="halo" cx="45%" cy="18%" r="90%">
      <stop offset="0" stop-color="rgba(200,168,90,0.24)" />
      <stop offset="0.55" stop-color="rgba(200,168,90,0.10)" />
      <stop offset="1" stop-color="rgba(200,168,90,0)" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1200" height="800" rx="44" fill="#050608" />
  <rect width="1200" height="800" rx="44" fill="url(#halo)" />

  <g filter="url(#blur)" opacity="0.75">
    <circle cx="320" cy="160" r="190" fill="rgba(200,168,90,0.22)" />
    <circle cx="980" cy="220" r="220" fill="rgba(255,255,255,0.08)" />
  </g>

  <g transform="translate(90 90)">
    <rect width="1020" height="620" rx="36" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" />

    <g transform="translate(80 130)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, system-ui" font-size="14" letter-spacing="6" fill="rgba(255,255,255,0.55)">
        E-COMMERCE PLATFORM
      </text>
      <text x="0" y="44" font-family="Cormorant Garamond, serif" font-size="52" font-weight="700" fill="url(#gold)">
        Gun &amp; Armour
      </text>
      <text x="0" y="84" font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.70)">
        React + MongoDB with CSS animations
      </text>
    </g>

    <g transform="translate(80 300)">
      <rect width="860" height="320" rx="28" fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.10)" />
      <text x="28" y="56" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="6" fill="rgba(255,255,255,0.55)">
        UI PREVIEW
      </text>

      <g transform="translate(28 86)">
        <rect width="260" height="88" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" />
        <text x="18" y="54" font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.72)">
          Product cards
        </text>
      </g>
      <g transform="translate(306 86)">
        <rect width="260" height="88" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" />
        <text x="18" y="54" font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.72)">
          Filters
        </text>
      </g>
      <g transform="translate(584 86)">
        <rect width="248" height="88" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" />
        <text x="18" y="54" font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.72)">
          Animations
        </text>
      </g>

      <rect x="28" y="220" width="804" height="10" rx="999" fill="rgba(255,255,255,0.08)" />
      <rect x="28" y="220" width="520" height="10" rx="999" fill="rgba(200,168,90,0.55)" />
      <text x="28" y="270" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="4" fill="rgba(233,216,166,0.85)">
        UX FLOW
      </text>
    </g>
