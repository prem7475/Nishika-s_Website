<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9D8A6" />
      <stop offset="0.45" stop-color="#C8A85A" />
      <stop offset="1" stop-color="#9A7A36" />
    </linearGradient>
    <radialGradient id="halo" cx="35%" cy="25%" r="85%">
      <stop offset="0" stop-color="rgba(200,168,90,0.22)" />
      <stop offset="0.55" stop-color="rgba(200,168,90,0.10)" />
      <stop offset="1" stop-color="rgba(200,168,90,0)" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1200" height="800" rx="44" fill="#050608" />
  <rect width="1200" height="800" rx="44" fill="url(#halo)" />

  <g filter="url(#blur)" opacity="0.75">
    <circle cx="250" cy="210" r="190" fill="rgba(200,168,90,0.22)" />
    <circle cx="980" cy="180" r="220" fill="rgba(255,255,255,0.08)" />
  </g>

  <g transform="translate(90 90)">
    <rect width="1020" height="620" rx="36" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" />

    <g transform="translate(80 130)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, system-ui" font-size="14" letter-spacing="6" fill="rgba(255,255,255,0.55)">
        PERSONAL PORTFOLIO WEBSITE
      </text>
      <text x="0" y="44" font-family="Cormorant Garamond, serif" font-size="54" font-weight="700" fill="url(#gold)">
        Portfolio Site
      </text>
      <text x="0" y="84" font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.70)">
        HTML • CSS • Bootstrap
      </text>
    </g>

    <g transform="translate(80 300)">
      <rect width="860" height="320" rx="28" fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.10)" />
      <text x="28" y="56" font-family="Plus Jakarta Sans, system-ui" font-size="12" letter-spacing="6" fill="rgba(255,255,255,0.55)">
        SECTIONS
      </text>
      <g font-family="Plus Jakarta Sans, system-ui" font-size="16" fill="rgba(255,255,255,0.72)">
        <text x="28" y="110">Intro • About • Skills</text>
        <text x="28" y="146">Projects • Contact</text>
        <text x="28" y="182">Responsive layout</text>
      </g>

      <g opacity="0.18" stroke="#FFFFFF" stroke-width="1">
        <path d="M28 220H832" />
        <path d="M28 260H832" />
        <path d="M28 300H832" />
      </g>
    </g>
  </g>
</svg>

